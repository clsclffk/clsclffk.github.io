<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jisu homepage</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Jisu's Homepage</h1>
        <button id="darkModeToggle">다크모드</button>
    </header>

    <nav>
        <ul>
            <li><a href="#about">About Me</a></li>
            <li><a href="#subjects">Current Subjects</a></li>
            <li><a href="#progress">Progress</a></li>
            <li><a href="#github">GitHub</a></li>
        </ul>
    </nav>

    <main>
        <section id="about">
            <h3>About Me</h3>
            <p>
                <img src="다운로드.jfif" width="100" height="100" alt="태닝 키티"/>
                <strong>데이터 엔지니어</strong>를 꿈꾸며 열심히 공부 중 입니다.
            </p>
        </section>

        <section id="subjects">
            <h3>Current Subjects</h3>
            <ul>
                <li>Python</li>
                <li>HTML</li>
                <li>Django</li>
            </ul>
        </section>

        <section id="progress">
            <h3>Progress</h3>
            <table border="1">
                <thead>
                    <tr>
                        <th></th>
                        <th>Subject</th>
                        <th>Progress</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>1</td>
                        <td>Python</td>
                        <td>데이터 분석 & 시각화</td>
                    </tr>
                    <tr>
                        <td>2</td>
                        <td>HTML</td>
                        <td>기본 구조 이해</td>
                    </tr>
                    <tr>
                        <td>3</td>
                        <td>Django</td>
                        <td>준비</td>
                    </tr>
                </tbody>
            </table>
        </section>

        <section id="github">
            <h3>Github</h3>
            <p>
                <a href="https://github.com/clsclffk" target="_blank">GitHub</a>
            </p>
        </section>
    </main>

    <footer>
        <p>&copy; Jisu's Homepage. All rights reserved.</p>
    </footer>
    
    <script>
        const darkModeToggle = document.getElementById('darkModeToggle');
        const body = document.body;
    
        darkModeToggle.addEventListener('click', () => {
            body.classList.toggle('dark-mode');
            document.querySelectorAll('header, section, table, nav, footer').forEach(el => {
                el.classList.toggle('dark-mode');
            });
    
            // 다크 모드 여부에 따라 버튼 텍스트 변경
            if (body.classList.contains('dark-mode')) {
                darkModeToggle.textContent = '라이트모드';
            } else {
                darkModeToggle.textContent = '다크모드';
            }
        });
        
    </script>
</body>
</html>
